name: Claude Code (Opus)

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]
  pull_request_review:
    types: [submitted]

jobs:
  claude-opus:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude-opus')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude-opus')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude-opus')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude-opus') || contains(github.event.issue.title, '@claude-opus')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code (Opus)
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Escalation tier: respond to @claude-opus mentions only
          trigger_phrase: "@claude-opus"

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Run on Opus with the same turn cap as the default worker. See
          # https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          claude_args: '--model opus --max-turns 75 --allowedTools "Edit,MultiEdit,Write,Bash(npm ci),Bash(npm install),Bash(npm run:*),Bash(npm test:*)"'
